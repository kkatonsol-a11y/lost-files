      max-width: 100%;
      overflow-x: hidden;
    }

    }

      display: inline-block;
      background-color: #00ff00;
      width: 9px;
      height: 18px;
      vertical-align: middle;
      animation: blink 0.6s step-end infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }
