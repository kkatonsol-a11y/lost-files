<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>L O S T - F I L E S | PROJECTS</title>
  <link href="style.css" rel="stylesheet">
  
  <style>
    body { background:#000; color:#00ff00; font-family:"Courier New", monospace; }
    .gallery {
      max-width: 1100px;
      margin: 40px auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 15px;
      padding: 0 20px;
    }
    .gallery-item {
      position: relative;
      overflow: hidden;
      border: 1px solid #00ff0044;
      cursor: pointer;
    }
    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s;
    }
    .gallery-item:hover img {
      transform: scale(1.08);
    }
    .gallery-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.9));
      color: #00ff00;
      padding: 20px 15px 15px;
      font-size: 1.1em;
    }
  </style>
</head>
<body>

<pre class="ascii"> [ PROJECT GALLERY ] </pre>

<div class="gallery">
  <a href="project-moutgx.html" class="gallery-item">
    <img src="images/projects/moutg-thumb.jpg" alt="MOUTG X">
    <div class="gallery-overlay">MOUTG X</div>
  </a>

  <a href="project-neonsoul.html" class="gallery-item">
    <img src="images/projects/neon-thumb.jpg" alt="NEON SOUL">
    <div class="gallery-overlay">NEON SOUL</div>
  </a>

  <a href="project-ktb.html" class="gallery-item">
    <img src="images/projects/ktb-thumb.jpg" alt="KILL THE BANKS">
    <div class="gallery-overlay">KILL THE BANKS</div>
  </a>
</div>

</body>
</html>
