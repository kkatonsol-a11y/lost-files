<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>L O S T - F I L E S | RANDOM</title>
  <link href="style.css" rel="stylesheet">
  
  <style>
    body { background:#000; color:#00ff00; font-family:"Courier New", monospace; }
    .random-grid {
      max-width: 1100px;
      margin: 40px auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 12px;
      padding: 0 20px;
    }
    .random-item {
      border: 1px solid #00ff0044;
      overflow: hidden;
    }
    .random-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s;
    }
    .random-item:hover img {
      transform: scale(1.1);
    }
  </style>
</head>
<body>

<pre class="ascii"> [ RANDOM FILES ] </pre>

<div class="random-grid">
  <div class="random-item">
    <img src="images/random/1.jpg" alt="">
  </div>
  <div class="random-item">
    <img src="images/random/2.jpg" alt="">
  </div>
  <div class="random-item">
    <img src="images/random/3.jpg" alt="">
  </div>
  <!-- הוסף עוד כמה -->
</div>

</body>
</html>
