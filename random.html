<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>L O S T - F I L E S | RANDOM</title>
  <link href="style.css" rel="stylesheet">
  
  <style>
    body { background:#000; color:#00ff00; font-family:"Courier New", monospace; }
    .random-grid {
      max-width: 1100px;
      margin: 40px auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 15px;
      padding: 0 20px;
    }
    .random-item {
      border: 1px solid #00ff0044;
      overflow: hidden;
      transition: transform 0.3s;
      text-align: center;
    }
    .random-item:hover {
      transform: scale(1.05);
      border-color: #00ff00;
    }
    .random-item img {
      width: auto;
      max-width: 100%;
      height: auto;
      display: block;
      margin: 0 auto;
    }
  </style>
</head>
<body>

<pre class="ascii"> [ RANDOM FILES ARCHIVE ] </pre>

<div class="random-grid">
  <div class="random-item">
    <img src="images/random/SF_BOX2.png" alt="SF BOX">
  </div>
  
  <!-- הוסף כאן עוד תמונות -->
</div>

</body>
</html>
