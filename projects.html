<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>L O S T - F I L E S | PROJECTS</title>
  
  <link href="style.css" rel="stylesheet" type="text/css" media="all">
  
  <style>
    /* ... אותו style כמו קודם ... */

    /* MODAL */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.95);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      background: #111;
      border: 2px solid #00ff00;
      max-width: 800px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
      padding: 20px;
      position: relative;
    }

    .close-btn {
      position: absolute;
      top: 15px;
      right: 20px;
      font-size: 28px;
      cursor: pointer;
      color: #00ff00;
    }

    .modal-images {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 15px;
      margin: 20px 0;
    }

    .modal-images img {
      width: 100%;
      border: 1px solid #00ff0044;
    }
  </style>
</head>
<body>

<!-- ... ASCII + typing ... -->

<div class="projects-container">
  <div class="project-item" onclick="openProject(0)">
    <div class="project-title">01 — MOUTG X</div>
    <div class="project-desc">עיצוב מותג מלא...</div>
    <span class="read-more">&gt; VIEW PROJECT</span>
  </div>

  <!-- אותו דבר לפרויקטים האחרים עם onclick="openProject(1)" וכו' -->
</div>

<!-- MODAL -->
<div id="project-modal" class="modal">
  <div class="modal-content">
    <span class="close-btn" onclick="closeModal()">×</span>
    <div id="modal-title" style="font-size:1.4em; margin-bottom:10px;"></div>
    <div id="modal-desc"></div>
    <div id="modal-images" class="modal-images"></div>
  </div>
</div>

<script>
// נתוני פרויקטים
const projectsData = [
  {
    title: "01 — MOUTG X",
    desc: "עיצוב מותג מלא, זהות ויזואלית, אתר תדמית וחומרי שיווק.",
    images: ["images/projects/moutg1.jpg", "images/projects/moutg2.jpg", "images/projects/moutg3.jpg"]
  },
  // הוסף כאן פרויקטים נוספים
];

function openProject(index) {
  const p = projectsData[index];
  document.getElementById('modal-title').innerHTML = p.title;
  document.getElementById('modal-desc').innerHTML = p.desc;

  const imagesDiv = document.getElementById('modal-images');
  imagesDiv.innerHTML = p.images.map(src => `<img src="${src}" alt="">`).join('');

  document.getElementById('project-modal').style.display = 'flex';
}

function closeModal() {
  document.getElementById('project-modal').style.display = 'none';
}

// סגירה בלחיצה מחוץ לחלון
document.getElementById('project-modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
</script>

</body>
</html>
