<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>L O S T - F I L E S | Projects</title>
  <link href="style.css" rel="stylesheet">
  
  <style>
    body { background:#000; color:#00ff00; font-family: "Courier New", monospace; }
    .projects-grid {
      max-width: 900px;
      margin: 40px auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      padding: 0 20px;
    }
    .project-card {
      background: #111;
      border: 1px solid #00ff00;
      padding: 20px;
      transition: all 0.3s;
    }
    .project-card:hover {
      border-color: #00ff88;
      transform: translateY(-5px);
      box-shadow: 0 0 15px rgba(0,255,0,0.2);
    }
    .project-title { font-size: 1.3em; margin: 10px 0; }
    .project-desc { opacity: 0.9; line-height: 1.5; }
    .read-more {
      color: #00ff00;
      text-decoration: none;
      margin-top: 15px;
      display: inline-block;
    }
    .read-more:hover { color: #fff; }
  </style>
</head>
<body>

<pre class="ascii" style="margin:30px auto; font-size:14px;">
[ PROJECTS ARCHIVE ]
</pre>

<div class="projects-grid" id="projects-container">
  <!-- יתמלא ע"י JS -->
</div>

<script>
// נתוני הפרויקטים - כאן תוסיף פרויקטים חדשים
const projects = [
  {
    id: "01",
    title: "מותג X",
    shortDesc: "עיצוב מותג מלא + זהות ויזואלית + אתר",
    link: "project-01.html"
  },
  {
    id: "02",
    title: "סדרת איורים - NEON SOUL",
    shortDesc: "סדרת דמויות ואיורים דיגיטליים",
    link: "project-02.html"
  },
  {
    id: "03",
    title: "פלטפורמה - KILL THE BANKS",
    shortDesc: "אתר + מיתוג + תוכן",
    link: "project-03.html"
  }
];

const container = document.getElementById('projects-container');

projects.forEach(p => {
  container.innerHTML += `
    <div class="project-card">
      <div class="project-title">${p.title}</div>
      <div class="project-desc">${p.shortDesc}</div>
      <a href="${p.link}" class="read-more">&gt; READ MORE</a>
    </div>
  `;
});
</script>

</body>
</html>
