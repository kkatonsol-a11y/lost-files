<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="pageTitle">L O S T - F I L E S</title>
  <style>
    body {
      background: #000000;
      color: #00ff00;
      font-family: 'Courier New', Courier, monospace;
      margin: 0;
      padding: 20px;
      line-height: 1.6;
    }
    .terminal {
      border: 3px solid #00ff00;
      background: #0a0a0a;
      max-width: 800px;
      margin: 20px auto;
      padding: 20px;
    }
    .header {
      background: #111111;
      padding: 10px 16px;
      border-bottom: 2px solid #00ff00;
      margin-bottom: 20px;
    }
    a {
      color: #00ff00;
      text-decoration: underline;
    }
  </style>
</head>
<body>

<div class="terminal">
  <div class="header">
    user@kryptokat:~/lost-files $ cat entry.txt
  </div>
  
  <a href="index.html" style="color:#00ff00;">← BACK TO ARCHIVE</a>
  
  <h1 id="postTitle" style="color:#00ff00; margin:20px 0 10px 0;"></h1>
  <div id="postDate" style="opacity:0.7; margin-bottom:20px;"></div>
  <div id="postContent"></div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get('id');
const posts = JSON.parse(localStorage.getItem('blogPosts')) || [];

if (id !== null && posts[id]) {
  const post = posts[id];
  document.getElementById('postTitle').textContent = post.title;
  document.getElementById('postDate').textContent = new Date(post.date).toLocaleDateString('en-US', {
    year: 'numeric', month: 'long', day: 'numeric'
  });
  document.getElementById('postContent').innerHTML = post.content;
  document.getElementById('pageTitle').textContent = post.title + " | LOST FILES";
} else {
  document.body.innerHTML = `<div style="text-align:center; padding:50px; color:#00ff00;">POST NOT FOUND</div>`;
}
</script>
</body>
</html>
